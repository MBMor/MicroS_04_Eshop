name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Display .NET information
        run: dotnet --info

      - name: Verify Docker availability
        run: |
          docker version
          docker info

      - name: Restore API Gateway integration tests
        run: >
          dotnet restore
          tests/backend/integration/ApiGateway.IntegrationTests/ApiGateway.IntegrationTests.csproj

      - name: Restore messaging integration tests
        run: >
          dotnet restore
          tests/backend/integration/Eshop.Messaging.IntegrationTests/Eshop.Messaging.IntegrationTests.csproj
          
      - name: Restore domain unit tests
        run: >
          dotnet restore
          tests/backend/unit/Eshop.Domain.UnitTests/Eshop.Domain.UnitTests.csproj

      - name: Restore Basket Service
        run: >
          dotnet restore
          src/backend/services/BasketService/BasketService.csproj

      - name: Restore Catalog Service
        run: >
          dotnet restore
          src/backend/services/CatalogService/CatalogService.csproj

      - name: Restore RabbitMQ topology initializer
        run: >
          dotnet restore
          src/backend/tools/RabbitMq.TopologyInitializer/RabbitMq.TopologyInitializer.csproj

      - name: Restore Basket Service integration tests
        run: >
          dotnet restore
          tests/backend/integration/BasketService.IntegrationTests/BasketService.IntegrationTests.csproj

      - name: Restore Catalog Service integration tests
        run: >
          dotnet restore
          tests/backend/integration/CatalogService.IntegrationTests/CatalogService.IntegrationTests.csproj

      - name: Restore Orders Service integration tests
        run: >
          dotnet restore
          tests/backend/integration/OrdersService.IntegrationTests/OrdersService.IntegrationTests.csproj

      - name: Restore Inventory Service integration tests
        run: >
          dotnet restore
          tests/backend/integration/InventoryService.IntegrationTests/InventoryService.IntegrationTests.csproj

      - name: Restore Payments Service integration tests
        run: >
          dotnet restore
          tests/backend/integration/PaymentsService.IntegrationTests/PaymentsService.IntegrationTests.csproj

      - name: Restore Notifications Service integration tests
        run: >
          dotnet restore
          tests/backend/integration/NotificationsService.IntegrationTests/NotificationsService.IntegrationTests.csproj

      - name: Build API Gateway integration tests
        run: >
          dotnet build
          tests/backend/integration/ApiGateway.IntegrationTests/ApiGateway.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build messaging integration tests
        run: >
          dotnet build
          tests/backend/integration/Eshop.Messaging.IntegrationTests/Eshop.Messaging.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build domain unit tests
        run: >
          dotnet build
          tests/backend/unit/Eshop.Domain.UnitTests/Eshop.Domain.UnitTests.csproj
          --configuration Release
          --no-restore

      - name: Build Basket Service
        run: >
          dotnet build
          src/backend/services/BasketService/BasketService.csproj
          --configuration Release
          --no-restore

      - name: Build Catalog Service
        run: >
          dotnet build
          src/backend/services/CatalogService/CatalogService.csproj
          --configuration Release
          --no-restore

      - name: Build RabbitMQ topology initializer
        run: >
          dotnet build
          src/backend/tools/RabbitMq.TopologyInitializer/RabbitMq.TopologyInitializer.csproj
          --configuration Release
          --no-restore

      - name: Build Basket Service integration tests
        run: >
          dotnet build
          tests/backend/integration/BasketService.IntegrationTests/BasketService.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build Catalog Service integration tests
        run: >
          dotnet build
          tests/backend/integration/CatalogService.IntegrationTests/CatalogService.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build Orders Service integration tests
        run: >
          dotnet build
          tests/backend/integration/OrdersService.IntegrationTests/OrdersService.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build Inventory Service integration tests
        run: >
          dotnet build
          tests/backend/integration/InventoryService.IntegrationTests/InventoryService.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build Payments Service integration tests
        run: >
          dotnet build
          tests/backend/integration/PaymentsService.IntegrationTests/PaymentsService.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Build Notifications Service integration tests
        run: >
          dotnet build
          tests/backend/integration/NotificationsService.IntegrationTests/NotificationsService.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Run domain unit tests
        run: >
          dotnet test
          tests/backend/unit/Eshop.Domain.UnitTests/Eshop.Domain.UnitTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=domain-unit-tests.trx"
          --results-directory
          artifacts/test-results/unit

      - name: Run API Gateway integration tests
        run: >
          dotnet test
          tests/backend/integration/ApiGateway.IntegrationTests/ApiGateway.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=api-gateway-integration-tests.trx"
          --results-directory
          artifacts/test-results/api-gateway

      - name: Run Basket Service integration tests
        run: >
          dotnet test
          tests/backend/integration/BasketService.IntegrationTests/BasketService.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=basket-service-integration-tests.trx"
          --results-directory
          artifacts/test-results/basket-service

      - name: Run messaging integration tests
        run: |
          dotnet test \
            tests/backend/integration/Eshop.Messaging.IntegrationTests/Eshop.Messaging.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=messaging-integration-tests.trx" \
            --diag artifacts/test-results/messaging/vstest-diagnostic.log \
            --results-directory artifacts/test-results/messaging

      - name: Run Catalog Service integration tests
        run: >
          dotnet test
          tests/backend/integration/CatalogService.IntegrationTests/CatalogService.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=catalog-service-integration-tests.trx"
          --results-directory
          artifacts/test-results/catalog-service

      - name: Run Orders Service integration tests
        run: >
          dotnet test
          tests/backend/integration/OrdersService.IntegrationTests/OrdersService.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=orders-service-integration-tests.trx"
          --results-directory
          artifacts/test-results/orders-service

      - name: Run Inventory Service integration tests
        run: >
          dotnet test
          tests/backend/integration/InventoryService.IntegrationTests/InventoryService.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=inventory-service-integration-tests.trx"
          --results-directory
          artifacts/test-results/inventory-service

      - name: Run Payments Service integration tests
        run: >
          dotnet test
          tests/backend/integration/PaymentsService.IntegrationTests/PaymentsService.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=payments-service-integration-tests.trx"
          --results-directory
          artifacts/test-results/payments-service

      - name: Run Notifications Service integration tests
        run: >
          dotnet test
          tests/backend/integration/NotificationsService.IntegrationTests/NotificationsService.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger
          "trx;LogFileName=notifications-service-integration-tests.trx"
          --results-directory
          artifacts/test-results/notifications-service

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: artifacts/test-results/**/*.trx
          if-no-files-found: warn
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Display Node.js information
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check frontend
        run: npm run typecheck

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  containers:
    name: Container images

    needs:
      - backend
      - frontend

    runs-on: ubuntu-latest

    timeout-minutes: 45

    env:
      DOCKER_BUILD_RECORD_RETENTION_DAYS: "7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Validate Docker Bake definition
        run: >
          docker buildx bake
          --file docker-bake.hcl
          --print

      - name: Build application container images
        uses: docker/bake-action@v7
        with:
          source: .
          files: docker-bake.hcl
          pull: true