name: eshop

services:
  postgres:
    image: postgres:18
    container_name: eshop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eshop_password}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      CATALOG_DB: ${CATALOG_DB:-catalog_db}
      ORDERS_DB: ${ORDERS_DB:-orders_db}
      INVENTORY_DB: ${INVENTORY_DB:-inventory_db}
      PAYMENTS_DB: ${PAYMENTS_DB:-payments_db}
      NOTIFICATIONS_DB: ${NOTIFICATIONS_DB:-notifications_db}
      KEYCLOAK_DB: ${KEYCLOAK_DB:-keycloak_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eshop} -d ${POSTGRES_DEFAULT_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - eshop-public
      - eshop-internal

  redis:
    image: redis:8
    container_name: eshop-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - eshop-internal

  rabbitmq:
    image: rabbitmq:4-management
    container_name: eshop-rabbitmq
    hostname: eshop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-eshop}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-eshop_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - eshop-public
      - eshop-internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: eshop-keycloak
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_password}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB:-keycloak_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-eshop}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-eshop_password}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-public
      - eshop-internal

networks:
  eshop-public:
    name: eshop-public

  eshop-internal:
    name: eshop-internal
    internal: true

volumes:
  postgres-data:
    name: eshop-postgres-data

  redis-data:
    name: eshop-redis-data

  rabbitmq-data:
    name: eshop-rabbitmq-data
