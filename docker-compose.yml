name: eshop

services:
  postgres:
    image: postgres:18
    container_name: eshop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eshop_password}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      CATALOG_DB: ${CATALOG_DB:-catalog_db}
      ORDERS_DB: ${ORDERS_DB:-orders_db}
      INVENTORY_DB: ${INVENTORY_DB:-inventory_db}
      PAYMENTS_DB: ${PAYMENTS_DB:-payments_db}
      NOTIFICATIONS_DB: ${NOTIFICATIONS_DB:-notifications_db}
      KEYCLOAK_DB: ${KEYCLOAK_DB:-keycloak_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-eshop} -d ${POSTGRES_DEFAULT_DB:-postgres}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - eshop-public
      - eshop-internal

  redis:
    image: redis:8
    container_name: eshop-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - eshop-public
      - eshop-internal

  rabbitmq:
    image: rabbitmq:4-management
    container_name: eshop-rabbitmq
    hostname: eshop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-eshop}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-eshop_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - eshop-public
      - eshop-internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: eshop-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_password}

      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB:-keycloak_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-eshop}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-eshop_password}

      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-18080}:8080"
    volumes:
      - ./infrastructure/keycloak/eshop-realm.json:/opt/keycloak/data/import/eshop-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "{ printf 'HEAD /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&0; grep -q 'HTTP/1.1 200'; } 0<>/dev/tcp/127.0.0.1/9000"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - eshop-public
      - eshop-internal

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: eshop-aspire-dashboard
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: ${ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS:-true}
    ports:
      - "${ASPIRE_DASHBOARD_PORT:-18888}:18888"
      - "${ASPIRE_DASHBOARD_OTLP_GRPC_PORT:-4317}:18889"
      - "${ASPIRE_DASHBOARD_OTLP_HTTP_PORT:-4318}:18890"
    networks:
      - eshop-public
      - eshop-internal

  frontend:
    build:
      context: ./src/frontend
      target: development
    container_name: eshop-frontend
    command:
      - sh
      - -c
      - npm ci --no-audit --no-fund && npm run dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://host.docker.internal:5080}
      VITE_DEVELOPMENT_CUSTOMER_ID: ${VITE_DEVELOPMENT_CUSTOMER_ID:-local-development-user}
    ports:
      - "${REACT_FRONTEND_HTTP_PORT:-5173}:5173"
    volumes:
      - ./src/frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - eshop-public

networks:
  eshop-public:
    name: eshop-public

  eshop-internal:
    name: eshop-internal
    internal: true

volumes:
  postgres-data:
    name: eshop-postgres-data

  redis-data:
    name: eshop-redis-data

  rabbitmq-data:
    name: eshop-rabbitmq-data

  frontend-node-modules:
    name: eshop-frontend-node-modules
